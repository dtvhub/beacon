<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexington Rescue Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-sA+4J1rGgGkS2Jp3xNmPR9U1FVLtZLk52I7Di5BkYkM="

<body>
  <div id="map"></div>

  ></script>

  <!-- YAML parser for codes.yml -->

  <!-- Your map + incident scripts -->
  <script src="js/map.js"></script>
  <script src="js/lexington.js"></script>

</html>
